<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institutional Crypto Data Terminal | Premium Market Signals</title>
    <meta name="description" content="High-frequency cryptocurrency trading signals and real-time market analytics.">
    <style>
        body { 
            background: #0b0e11; 
            color: #f3ba2f; 
            font-family: monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .terminal { 
            width: 90%; 
            max-width: 800px; 
            font-size: 14px; 
            color: #00ff00; 
            border: 1px solid #222; 
            padding: 20px; 
            margin-bottom: 40px; 
            background: #000; 
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1); 
        }
        /* Grid modificado para 3 anuncios: muy espaciados y limpios para subir el CPM */
        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: space-evenly; 
            gap: 50px; 
            width: 100%; 
            max-width: 1200px; 
            margin-top: 20px; 
        }
        .ad-container { 
            margin: auto; 
            z-index: 99998; 
            background: #161a1e; 
            padding: 10px; 
            border: 1px solid #333; 
            border-radius: 5px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
        }
    </style>
</head>
<body>
    <div class="terminal">
        > NODE_STATUS: ONLINE<br>
        > SECURITY_PROTOCOL: ACTIVE<br>
        > PREMIUM_CRYPTO_STREAM: BTC_USD_LIVE<br>
        > REFRESH_TIMER: <span id="timer">60</span>s
    </div>

    <div class="grid">
        <div class="ad-container">
            <iframe data-aa='2434807' src='//ad.a-ads.com/2434807/?size=300x250' style='border:0; padding:0; width:300px; height:250px; overflow:hidden; display:block; margin:auto;'></iframe>
        </div>
        <div class="ad-container">
            <iframe data-aa='2434810' src='//ad.a-ads.com/2434810/?size=300x250' style='border:0; padding:0; width:300px; height:250px; overflow:hidden; display:block; margin:auto;'></iframe>
        </div>
        <div class="ad-container">
            <iframe data-aa='2434811' src='//ad.a-ads.com/2434811/?size=300x250' style='border:0; padding:0; width:300px; height:250px; overflow:hidden; display:block; margin:auto;'></iframe>
        </div>
        </div>

    <script>
        let timeLeft = 60;
        setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) location.reload();
        }, 1000);
    </script>
</body>
</html>
